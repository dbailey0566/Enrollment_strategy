<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enrollment Strategic Plan</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/main.js"></script>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <h1>Enrollment Strategic Plan</h1>
      <p id="metaInfo" class="meta"></p>
    </div>
    <div class="actions">
      <button id="printBtn">Print</button>
      <button id="adminToggle">Admin Mode</button>
      <button id="exportJsonBtn" style="display:none;">Generate Updated JSON</button>
    </div>
  </div>
</header>

<main>
  <div id="pillarContainer"></div>
</main>

<footer>
  Strategic plan version controlled via GitHub.
</footer>

  <div id="jsonModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Updated pillars.json</h3>
      <textarea id="jsonOutput"></textarea>
      <div class="modal-actions">
        <button id="copyJsonBtn">Copy</button>
        <button id="closeModalBtn">Close</button>
      </div>
    </div>
  </div>

</body>
</html>
